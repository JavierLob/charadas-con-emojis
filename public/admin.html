<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🔧 Admin – Charadas con Emojis</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0f0e17; --surface: #1a1929; --s2: #252438; --s3: #2e2d45;
      --accent: #a855f7; --adim: rgba(168,85,247,0.15);
      --ok: #06d6a0; --err: #ef233c;
      --text: #fffffe; --t2: #a7a9be; --border: #2e2d45; --r: 10px;
    }
    html, body { height: 100%; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); overflow: hidden; font-size: 14px; }

    /* Login */
    #login { display:flex; flex-direction:column; align-items:center; justify-content:center; height:100vh; gap:14px; }
    #login h1 { font-size:26px; }
    .login-input { padding:11px 14px; font-size:15px; background:var(--s2); border:2px solid var(--border); border-radius:var(--r); color:var(--text); outline:none; width:260px; }
    .login-input:focus { border-color:var(--accent); }

    /* Layout */
    #app { display:none; height:100vh; flex-direction:column; }
    .topbar { background:var(--surface); border-bottom:1px solid var(--border); padding:0 20px; height:48px; display:flex; align-items:center; justify-content:space-between; flex-shrink:0; }
    .topbar-title { font-weight:800; font-size:15px; }
    .main { display:flex; flex:1; overflow:hidden; }

    /* Sidebar */
    .sidebar { width:230px; flex-shrink:0; background:var(--surface); border-right:1px solid var(--border); display:flex; flex-direction:column; }
    .sb-head { padding:12px 14px; font-size:11px; font-weight:700; color:var(--t2); text-transform:uppercase; letter-spacing:1px; border-bottom:1px solid var(--border); }
    .cat-list { flex:1; overflow-y:auto; padding:6px; }
    .cat-item { display:flex; align-items:center; gap:9px; padding:9px 10px; border-radius:var(--r); cursor:pointer; margin-bottom:2px; transition:background 0.1s; }
    .cat-item:hover { background:var(--s2); }
    .cat-item.active { background:var(--adim); }
    .cat-thumb { width:34px; height:48px; border-radius:5px; flex-shrink:0; background:var(--s3); overflow:hidden; display:flex; align-items:center; justify-content:center; font-size:16px; }
    .cat-thumb img { width:100%; height:100%; object-fit:cover; }
    .cat-info .cat-name { font-size:13px; font-weight:700; }
    .cat-info .cat-meta { font-size:11px; color:var(--t2); }
    .sb-foot { padding:10px; border-top:1px solid var(--border); }

    /* Panel */
    .panel { flex:1; overflow:hidden; display:flex; flex-direction:column; }
    .empty { flex:1; display:flex; align-items:center; justify-content:center; flex-direction:column; gap:10px; color:var(--t2); }

    /* Cat header */
    .cat-hdr { background:var(--surface); border-bottom:1px solid var(--border); padding:14px 18px; display:flex; gap:14px; align-items:center; flex-shrink:0; }
    .cat-img-preview { width:56px; height:78px; border-radius:8px; background:var(--s2); border:2px solid var(--border); flex-shrink:0; overflow:hidden; display:flex; align-items:center; justify-content:center; font-size:22px; }
    .cat-img-preview img { width:100%; height:100%; object-fit:cover; }
    .cat-fields { flex:1; display:flex; flex-direction:column; gap:7px; }
    .f-row { display:flex; align-items:center; gap:8px; }
    .f-label { font-size:11px; color:var(--t2); width:70px; flex-shrink:0; }
    .f-inp { flex:1; padding:7px 10px; background:var(--s2); border:1px solid var(--border); border-radius:6px; color:var(--text); font-size:13px; outline:none; }
    .f-inp:focus { border-color:var(--accent); }

    /* Tabs */
    .tabs { display:flex; border-bottom:1px solid var(--border); padding:0 18px; flex-shrink:0; background:var(--surface); }
    .tab-btn { padding:9px 14px; font-size:13px; font-weight:600; color:var(--t2); border:none; background:none; cursor:pointer; border-bottom:2px solid transparent; margin-bottom:-1px; }
    .tab-btn.active { color:var(--accent); border-bottom-color:var(--accent); }
    .tab-pane { display:none; flex:1; overflow:hidden; flex-direction:column; }
    .tab-pane.active { display:flex; }

    /* Words tab */
    .words-toolbar { padding:10px 18px; display:flex; gap:7px; align-items:center; border-bottom:1px solid var(--border); flex-shrink:0; }
    .srch { flex:1; padding:7px 11px; background:var(--s2); border:1px solid var(--border); border-radius:var(--r); color:var(--text); font-size:13px; outline:none; }
    .srch:focus { border-color:var(--accent); }
    .word-list { flex:1; overflow-y:auto; padding:6px 18px; }
    .wcount { padding:4px 18px 0; font-size:11px; color:var(--t2); flex-shrink:0; }

    /* Word row */
    .word-row {
      display:flex; align-items:center; gap:8px; padding:6px 8px;
      border-radius:7px; margin-bottom:3px; border:1px solid transparent;
    }
    .word-row:hover { background:var(--s2); border-color:var(--border); }
    .word-row input[type=checkbox] { flex-shrink:0; width:15px; height:15px; accent-color:var(--accent); cursor:pointer; }
    .word-poster { width:28px; height:40px; border-radius:4px; background:var(--s3); overflow:hidden; flex-shrink:0; display:flex; align-items:center; justify-content:center; font-size:13px; cursor:pointer; position:relative; }
    .word-poster img { width:100%; height:100%; object-fit:cover; }
    .word-poster:hover::after { content:'✏️'; position:absolute; inset:0; background:rgba(0,0,0,0.7); display:flex; align-items:center; justify-content:center; font-size:11px; }
    .word-fields { flex:1; display:flex; flex-direction:column; gap:3px; min-width:0; }
    .w-title { background:none; border:none; color:var(--text); font-size:13px; font-weight:600; outline:none; width:100%; }
    .w-title:focus { background:var(--s3); padding:2px 6px; border-radius:4px; }
    .w-img-url { background:none; border:none; color:var(--t2); font-size:11px; outline:none; width:100%; font-family:monospace; }
    .w-img-url:focus { background:var(--s3); padding:2px 6px; border-radius:4px; color:var(--text); }
    .w-img-url::placeholder { color:var(--s3); }
    .del-btn { background:none; border:none; color:var(--t2); cursor:pointer; font-size:13px; padding:2px 5px; border-radius:4px; opacity:0; flex-shrink:0; }
    .word-row:hover .del-btn { opacity:1; }
    .del-btn:hover { color:var(--err); }

    .add-bar { padding:10px 18px; border-top:1px solid var(--border); display:flex; gap:6px; flex-shrink:0; flex-direction:column; }
    .add-row { display:flex; gap:6px; }

    /* Scrape tab */
    .scrape-wrap { flex:1; overflow:hidden; display:flex; flex-direction:column; }
    .scrape-top { padding:14px 18px; display:flex; flex-direction:column; gap:8px; border-bottom:1px solid var(--border); flex-shrink:0; }
    .url-row { display:flex; gap:7px; }
    .url-inp { flex:1; padding:9px 12px; background:var(--s2); border:1px solid var(--border); border-radius:var(--r); color:var(--text); font-size:13px; outline:none; font-family:monospace; }
    .url-inp:focus { border-color:var(--accent); }
    .scrape-hint { font-size:11px; color:var(--t2); }
    .scrape-body { flex:1; overflow-y:auto; }
    .scrape-results-hdr { position:sticky; top:0; background:var(--s2); border-bottom:1px solid var(--border); padding:8px 18px; display:flex; align-items:center; justify-content:space-between; z-index:1; }
    .results-tbl { width:100%; border-collapse:collapse; }
    .results-tbl td { padding:6px 8px; border-bottom:1px solid var(--border); vertical-align:middle; }
    .results-tbl tr:hover td { background:var(--s2); }
    .res-thumb { width:32px; }
    .res-thumb-img { width:28px; height:40px; border-radius:4px; background:var(--s3); overflow:hidden; display:flex; align-items:center; justify-content:center; font-size:14px; }
    .res-thumb-img img { width:100%; height:100%; object-fit:cover; }
    .res-title-inp { background:none; border:none; color:var(--text); font-size:13px; outline:none; width:100%; }
    .res-title-inp:focus { background:var(--s3); padding:2px 6px; border-radius:4px; }
    .scrape-foot { padding:10px 18px; border-top:1px solid var(--border); display:flex; gap:8px; align-items:center; flex-shrink:0; }

    /* Buttons */
    .btn { padding:7px 14px; border:none; border-radius:var(--r); font-size:13px; font-weight:700; cursor:pointer; display:inline-flex; align-items:center; gap:5px; white-space:nowrap; transition:opacity 0.1s; }
    .btn:hover { opacity:0.85; } .btn:active { opacity:0.7; } .btn:disabled { opacity:0.4; pointer-events:none; }
    .btn-primary { background:var(--accent); color:#fff; }
    .btn-ok { background:var(--ok); color:#0f0e17; }
    .btn-err { background:var(--err); color:#fff; }
    .btn-ghost { background:var(--s2); color:var(--text); }
    .btn-sm { padding:5px 10px; font-size:12px; }

    .spinner { display:inline-block; width:14px; height:14px; border:2px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin 0.6s linear infinite; }
    @keyframes spin { to { transform:rotate(360deg); } }
    input[type=checkbox] { accent-color:var(--accent); cursor:pointer; }

    .toast { position:fixed; bottom:14px; left:50%; transform:translateX(-50%); background:var(--s2); border:1px solid var(--border); color:var(--text); padding:7px 18px; border-radius:30px; font-size:13px; font-weight:600; opacity:0; transition:opacity 0.3s; pointer-events:none; z-index:999; white-space:nowrap; }
    .toast.show { opacity:1; }
    .toast.ok { border-color:var(--ok); color:var(--ok); }
    .toast.err { border-color:var(--err); color:var(--err); }
  </style>
</head>
<body>

<div id="login">
  <div style="font-size:36px">🔧</div>
  <h1>Panel de Admin</h1>
  <input class="login-input" type="password" id="pwd" placeholder="Contraseña" autocomplete="current-password">
  <button class="btn btn-primary" onclick="doLogin()">Entrar</button>
  <div style="color:var(--err);font-size:12px;min-height:16px" id="login-err"></div>
</div>

<div id="app">
  <div class="topbar">
    <div class="topbar-title">🔧 Admin · Charadas con Emojis</div>
    <div style="display:flex;gap:8px">
      <button class="btn btn-ghost btn-sm" onclick="exportData()" title="Descargar backup de categorías">⬇ Exportar</button>
      <label class="btn btn-ghost btn-sm" title="Restaurar desde backup" style="cursor:pointer">
        ⬆ Importar<input type="file" accept=".json" style="display:none" onchange="importData(this)">
      </label>
      <a href="/" target="_blank" class="btn btn-ghost btn-sm">🎮 Ver juego</a>
      <button class="btn btn-ghost btn-sm" onclick="logout()">Salir</button>
    </div>
  </div>
  <div class="main">
    <div class="sidebar">
      <div class="sb-head">Categorías</div>
      <div class="cat-list" id="cat-list"></div>
      <div class="sb-foot">
        <button class="btn btn-ghost btn-sm" style="width:100%" onclick="newCat()">+ Nueva categoría</button>
      </div>
    </div>
    <div class="panel" id="panel">
      <div class="empty"><div style="font-size:40px">📂</div><div>Seleccioná una categoría</div></div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
let KEY = sessionStorage.getItem('ak') || '';
let categories = [], selected = null, scrapeData = [];

// ── Auth ──────────────────────────────────────────────────────────

document.getElementById('pwd').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });

async function doLogin() {
  const k = document.getElementById('pwd').value;
  const r = await fetch('/api/categories/movies', { headers: { 'x-admin-key': k } });
  if (r.status === 401) { document.getElementById('login-err').textContent = 'Contraseña incorrecta'; return; }
  sessionStorage.setItem('ak', k); location.reload();
}

function logout() { sessionStorage.removeItem('ak'); location.reload(); }

// ── Init ─────────────────────────────────────────────────────────

async function init() {
  if (!KEY) return;
  const test = await fetch('/api/categories/movies', { headers: { 'x-admin-key': KEY } });
  if (test.status === 401) { sessionStorage.removeItem('ak'); return; }
  document.getElementById('login').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  await loadCats();
}

async function loadCats() {
  const r = await fetch('/api/categories');
  categories = await r.json();
  renderSidebar();
  if (selected) {
    const still = categories.find(c => c.id === selected.id);
    if (still) await selectCat(still.id);
  }
}

function renderSidebar() {
  document.getElementById('cat-list').innerHTML = categories.map(c => `
    <div class="cat-item ${selected?.id === c.id ? 'active' : ''}" onclick="selectCat('${c.id}')">
      <div class="cat-thumb">${c.image ? `<img src="${c.image}" onerror="this.style.display='none'">` : catIcon(c.id)}</div>
      <div class="cat-info">
        <div class="cat-name">${esc(c.name)}</div>
        <div class="cat-meta">${c.wordCount} palabras${c.combined ? ' · combinada' : ''}</div>
      </div>
    </div>`).join('');
}

function catIcon(id) {
  return { both:'🎬', movies:'🎥', series:'📺', infantiles:'🧸' }[id] || '📁';
}

// ── Select cat ────────────────────────────────────────────────────

async function selectCat(id) {
  const r = await fetch(`/api/categories/${id}`, { headers: { 'x-admin-key': KEY } });
  if (!r.ok) return;
  selected = await r.json();
  renderSidebar();
  renderPanel();
}

function renderPanel() {
  const c = selected, ro = c.combined;
  document.getElementById('panel').innerHTML = `
    <div class="cat-hdr">
      <div class="cat-img-preview" id="cat-prev">${c.image ? `<img src="${c.image}" onerror="this.innerHTML='${catIcon(c.id)}'">` : catIcon(c.id)}</div>
      <div class="cat-fields">
        <div class="f-row">
          <span class="f-label">Nombre</span>
          <input class="f-inp" id="fn" value="${esc(c.name)}" ${ro?'readonly':''}>
          ${!ro ? `<button class="btn btn-primary btn-sm" onclick="saveMeta()">Guardar</button>` : ''}
        </div>
        <div class="f-row">
          <span class="f-label">Imagen cat.</span>
          <input class="f-inp" id="fi" value="${esc(c.image||'')}" ${ro?'readonly':''} placeholder="URL imagen de portada de la categoría" oninput="prevCatImg(this.value)">
        </div>
        ${!ro ? `<div class="f-row"><span class="f-label"></span><button class="btn btn-err btn-sm" onclick="deleteCat()">🗑 Eliminar categoría</button></div>`
               : '<div style="font-size:11px;color:var(--t2)">Combina automáticamente Películas + Series.</div>'}
      </div>
    </div>

    <div class="tabs">
      <button class="tab-btn active" onclick="showTab('words',this)">📝 Palabras (${c.words?.length||0})</button>
      ${!ro ? `<button class="tab-btn" onclick="showTab('scrape',this)">🌐 Importar / Scrapear</button>` : ''}
    </div>

    <div class="tab-pane active" id="tab-words">
      ${ro ? `<div style="padding:18px;color:var(--t2);font-size:13px">Esta categoría combina Películas + Series. Editá cada una por separado.</div>` : `
        <div class="words-toolbar">
          <input class="srch" id="wsrch" placeholder="🔍 Buscar…" oninput="filterWords(this.value)">
          <button class="btn btn-err btn-sm" id="bulk-del" style="display:none" onclick="bulkDelete()">🗑 Eliminar</button>
        </div>
        <div class="wcount" id="wcount"></div>
        <div class="word-list" id="word-list"></div>
        <div class="add-bar">
          <div class="add-row">
            <input class="srch" id="nw-title" placeholder="Título nuevo…" style="flex:2" onkeydown="if(event.key==='Enter')addWord()">
            <input class="srch" id="nw-img" placeholder="URL imagen (opcional)" style="flex:3">
            <button class="btn btn-ok" onclick="addWord()">+ Agregar</button>
          </div>
        </div>
      `}
    </div>

    ${!ro ? `
    <div class="tab-pane" id="tab-scrape">
      <div class="scrape-wrap">
        <div class="scrape-top">
          <div class="url-row">
            <input class="url-inp" id="surl" placeholder="https://www.imdb.com/es/list/ls080023211/">
            <button class="btn btn-primary" id="sbtn" onclick="doScrape()">🌐 Scrapear</button>
          </div>
          <div class="scrape-hint">Pegá una URL de lista de IMDB, Wikipedia, etc. El scraper extrae título e imagen de cada película automáticamente.</div>
        </div>
        <div class="scrape-body" id="scrape-body">
          <div style="padding:30px;text-align:center;color:var(--t2)">Pegá una URL y hacé clic en Scrapear</div>
        </div>
        <div class="scrape-foot" id="scrape-foot" style="display:none">
          <button class="btn btn-ok" id="add-sel-btn" onclick="addScrapeSelected()">✅ Agregar seleccionados (<span id="sel-n">0</span>)</button>
          <span style="font-size:11px;color:var(--t2)" id="scrape-status"></span>
        </div>
      </div>
    </div>` : ''}
  `;
  if (!ro) renderWordList(selected.words || []);
}

// ── Words ─────────────────────────────────────────────────────────

let displayedWords = [];

function renderWordList(words, filter = '') {
  displayedWords = [...words].sort((a,b) => a.title.localeCompare(b.title, 'es', {sensitivity:'base'}));
  const shown = filter ? displayedWords.filter(w => w.title.toLowerCase().includes(filter.toLowerCase())) : displayedWords;
  document.getElementById('wcount').textContent = `${words.length} palabras${filter ? ` · ${shown.length} resultados` : ''}`;
  document.getElementById('word-list').innerHTML = shown.map(w => `
    <div class="word-row" data-title="${esc(w.title)}">
      <input type="checkbox" onchange="updBulk()">
      <div class="word-poster" onclick="editWordImg('${esc(w.title)}','${esc(w.image||'')}',this)" title="Click para cambiar imagen">
        ${w.image ? `<img src="${esc(w.image)}" onerror="this.style.display='none'">` : '🎬'}
      </div>
      <div class="word-fields">
        <input class="w-title" value="${esc(w.title)}" onchange="saveWordEdit('${esc(w.title)}',this.value,null)" onblur="saveWordEdit('${esc(w.title)}',this.value,null)">
        <input class="w-img-url" value="${esc(w.image||'')}" placeholder="URL de imagen del poster…" onchange="saveWordEdit('${esc(w.title)}',null,this.value)" onblur="saveWordEdit('${esc(w.title)}',null,this.value)">
      </div>
      <button class="del-btn" onclick="delWord('${esc(w.title)}')">✕</button>
    </div>`).join('');
}

function filterWords(q) { renderWordList(selected.words || [], q); }

function updBulk() {
  const n = document.querySelectorAll('#word-list input[type=checkbox]:checked').length;
  const btn = document.getElementById('bulk-del');
  if (btn) { btn.style.display = n ? 'inline-flex' : 'none'; btn.textContent = `🗑 Eliminar (${n})`; }
}

async function addWord() {
  const title = document.getElementById('nw-title').value.trim();
  const image = document.getElementById('nw-img').value.trim();
  if (!title) return;
  const r = await api('POST', `/api/categories/${selected.id}/words`, { words: [{ title, image }] });
  if (r.error) { toast(r.error,'err'); return; }
  document.getElementById('nw-title').value = '';
  document.getElementById('nw-img').value = '';
  if (r.added.length) {
    selected.words.push({ title, image });
    renderWordList(selected.words);
    refreshCount();
    toast(`"${title}" agregada ✓`);
  } else {
    toast('Ya existe esta palabra','err');
  }
}

async function delWord(title) {
  if (!confirm(`¿Eliminar "${title}"?`)) return;
  await api('DELETE', `/api/categories/${selected.id}/words`, { words: [title] });
  selected.words = selected.words.filter(w => w.title !== title);
  renderWordList(selected.words, document.getElementById('wsrch')?.value || '');
  refreshCount(); toast(`"${title}" eliminada`);
}

async function bulkDelete() {
  const checked = [...document.querySelectorAll('#word-list input[type=checkbox]:checked')];
  const titles = checked.map(cb => cb.closest('.word-row').dataset.title);
  if (!titles.length || !confirm(`¿Eliminar ${titles.length} palabras?`)) return;
  await api('DELETE', `/api/categories/${selected.id}/words`, { words: titles });
  selected.words = selected.words.filter(w => !titles.includes(w.title));
  renderWordList(selected.words);
  refreshCount(); toast(`${titles.length} palabras eliminadas`);
}

let editTimer = {};
async function saveWordEdit(oldTitle, newTitle, newImage) {
  clearTimeout(editTimer[oldTitle]);
  editTimer[oldTitle] = setTimeout(async () => {
    const current = selected.words.find(w => w.title === oldTitle);
    if (!current) return;
    const title = newTitle !== null ? newTitle.trim() : current.title;
    const image = newImage !== null ? newImage.trim() : current.image;
    if (title === current.title && image === current.image) return;
    await api('PUT', `/api/categories/${selected.id}/words`, { oldTitle, title, image });
    current.title = title; current.image = image;
    // Update poster thumbnail inline
    const row = document.querySelector(`.word-row[data-title="${esc(oldTitle)}"]`);
    if (row) {
      row.dataset.title = title;
      const poster = row.querySelector('.word-poster');
      if (poster) poster.innerHTML = image ? `<img src="${esc(image)}" onerror="this.style.display='none'">🎬` : '🎬';
    }
  }, 600);
}

function editWordImg(title, currentImg, posterEl) {
  const newUrl = prompt('URL de imagen para este póster:', currentImg);
  if (newUrl === null) return;
  posterEl.innerHTML = newUrl ? `<img src="${esc(newUrl)}" onerror="this.style.display='none'">` : '🎬';
  saveWordEdit(title, null, newUrl);
}

// ── Cat meta ──────────────────────────────────────────────────────

async function saveMeta() {
  const name = document.getElementById('fn').value.trim();
  const image = document.getElementById('fi').value.trim();
  await api('PUT', `/api/categories/${selected.id}`, { name, image });
  selected.name = name; selected.image = image;
  await loadCats(); toast('Categoría actualizada ✓');
}

function prevCatImg(url) {
  const el = document.getElementById('cat-prev');
  if (!el) return;
  el.innerHTML = url ? `<img src="${esc(url)}" onerror="this.innerHTML='${catIcon(selected.id)}'">` : catIcon(selected.id);
}

async function deleteCat() {
  if (!confirm(`¿Eliminar "${selected.name}" y todas sus palabras?`)) return;
  await api('DELETE', `/api/categories/${selected.id}`);
  selected = null;
  await loadCats();
  document.getElementById('panel').innerHTML = `<div class="empty"><div style="font-size:40px">📂</div><div>Seleccioná una categoría</div></div>`;
  toast('Categoría eliminada');
}

async function newCat() {
  const name = prompt('Nombre de la nueva categoría:');
  if (!name?.trim()) return;
  const r = await api('POST', '/api/categories', { name: name.trim() });
  if (r.error) { toast(r.error,'err'); return; }
  await loadCats(); selectCat(r.id); toast(`"${name}" creada ✓`);
}

// ── Scraper ───────────────────────────────────────────────────────

async function doScrape() {
  const url = document.getElementById('surl').value.trim();
  if (!url) return;
  const btn = document.getElementById('sbtn');
  const body = document.getElementById('scrape-body');
  btn.disabled = true; btn.innerHTML = '<span class="spinner"></span> Scrapeando…';
  body.innerHTML = '<div style="padding:30px;text-align:center;color:var(--t2)"><span class="spinner"></span> Extrayendo títulos e imágenes…</div>';
  document.getElementById('scrape-foot').style.display = 'none';

  const r = await api('POST', '/api/scrape', { url });
  btn.disabled = false; btn.innerHTML = '🌐 Scrapear';

  if (r.error) {
    body.innerHTML = `<div style="padding:18px;color:var(--err)">❌ Error: ${esc(r.error)}<br><br><span style="color:var(--t2);font-size:12px">IMDB puede bloquear el acceso desde el servidor. Intentá con Wikipedia u otro sitio de listas de películas.</span></div>`;
    return;
  }

  scrapeData = (r.results || []).map(item => ({ ...item, checked: true }));
  renderScrapeResults();
}

function renderScrapeResults() {
  const body = document.getElementById('scrape-body');
  if (!scrapeData.length) {
    body.innerHTML = '<div style="padding:18px;color:var(--t2)">No se encontraron títulos. Probá con otra URL.</div>';
    return;
  }
  const nChecked = scrapeData.filter(r => r.checked).length;
  body.innerHTML = `
    <div class="scrape-results-hdr">
      <span style="font-size:13px;font-weight:700">📥 ${scrapeData.length} títulos encontrados</span>
      <label style="font-size:12px;cursor:pointer;display:flex;align-items:center;gap:5px">
        <input type="checkbox" ${nChecked===scrapeData.length?'checked':''} onchange="toggleAll(this.checked)"> Seleccionar todos
      </label>
    </div>
    <table class="results-tbl">
      <tbody>
        ${scrapeData.map((item, i) => `
          <tr>
            <td style="width:36px;text-align:center"><input type="checkbox" ${item.checked?'checked':''} onchange="toggleItem(${i},this.checked)"></td>
            <td class="res-thumb">
              <div class="res-thumb-img">
                ${item.image ? `<img src="${esc(item.image)}" onerror="this.style.display='none'">` : '🎬'}
              </div>
            </td>
            <td><input class="res-title-inp" value="${esc(item.title)}" onchange="scrapeData[${i}].title=this.value"></td>
            <td style="width:200px">
              <input style="width:100%;background:none;border:none;color:var(--t2);font-size:11px;outline:none;font-family:monospace"
                value="${esc(item.image)}" placeholder="URL imagen…"
                onchange="scrapeData[${i}].image=this.value;this.closest('tr').querySelector('.res-thumb-img').innerHTML=this.value?'<img src='+JSON.stringify(this.value)+' onerror=this.style.display=none>':'🎬'"
              >
            </td>
          </tr>`).join('')}
      </tbody>
    </table>`;
  updScrapeFooter();
  document.getElementById('scrape-foot').style.display = 'flex';
}

function toggleAll(v) { scrapeData.forEach(r => r.checked = v); renderScrapeResults(); }
function toggleItem(i, v) { scrapeData[i].checked = v; updScrapeFooter(); }
function updScrapeFooter() {
  const n = scrapeData.filter(r => r.checked).length;
  document.getElementById('sel-n').textContent = n;
  document.getElementById('add-sel-btn').disabled = n === 0;
}

async function addScrapeSelected() {
  const toAdd = scrapeData.filter(r => r.checked).map(r => ({ title: r.title.trim(), image: r.image || '' })).filter(r => r.title);
  if (!toAdd.length) return;
  const r = await api('POST', `/api/categories/${selected.id}/words`, { words: toAdd });
  if (r.error) { toast(r.error,'err'); return; }
  toast(`✓ ${r.added.length} palabras agregadas${r.added.length < toAdd.length ? ` (${toAdd.length - r.added.length} ya existían)` : ''}`);
  selected.words = [...selected.words, ...r.added.map(title => {
    const found = toAdd.find(w => w.title === title);
    return found || { title, image: '' };
  })];
  scrapeData = [];
  document.getElementById('scrape-body').innerHTML = '<div style="padding:18px;color:var(--t2)">✓ Palabras agregadas. Pegá otra URL para seguir importando.</div>';
  document.getElementById('scrape-foot').style.display = 'none';
  document.getElementById('surl').value = '';
  refreshCount();
  showTab('words', document.querySelector('.tab-btn'));
  renderWordList(selected.words);
}

// ── Helpers ───────────────────────────────────────────────────────

function showTab(name, btn) {
  document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(`tab-${name}`)?.classList.add('active');
  btn?.classList.add('active');
}

function refreshCount() {
  const cat = categories.find(c => c.id === selected?.id);
  if (cat) cat.wordCount = selected.words?.length || 0;
  renderSidebar();
  const tb = document.querySelector('.tab-btn');
  if (tb && tb.textContent.includes('Palabras')) tb.textContent = `📝 Palabras (${selected.words?.length || 0})`;
}

async function api(method, url, body) {
  try {
    const r = await fetch(url, { method, headers: { 'Content-Type': 'application/json', 'x-admin-key': KEY }, body: body ? JSON.stringify(body) : undefined });
    return await r.json();
  } catch(e) { return { error: e.message }; }
}

// ── Export / Import ───────────────────────────────────────────────

async function exportData() {
  const r = await fetch('/api/export', { headers: { 'x-admin-key': KEY } });
  if (!r.ok) { toast('Error al exportar', 'err'); return; }
  const blob = await r.blob();
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `charadas-backup-${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  URL.revokeObjectURL(a.href);
  toast('✓ Backup descargado');
}

async function importData(input) {
  const file = input.files[0];
  if (!file) return;
  input.value = '';
  let parsed;
  try { parsed = JSON.parse(await file.text()); } catch { toast('Archivo JSON inválido', 'err'); return; }
  if (!confirm(`¿Reemplazar TODAS las categorías con el backup "${file.name}"?\nEsta acción no se puede deshacer.`)) return;
  const r = await api('POST', '/api/import', parsed);
  if (r.error) { toast(r.error, 'err'); return; }
  toast(`✓ Importadas ${r.categories} categorías`);
  selected = null;
  await loadCats();
  document.getElementById('panel').innerHTML = `<div class="empty"><div style="font-size:40px">✅</div><div>Importación completada</div></div>`;
}

let toastT;
function toast(msg, type='ok') {
  const el = document.getElementById('toast');
  el.textContent = msg; el.className = `toast show ${type}`;
  clearTimeout(toastT); toastT = setTimeout(() => el.className='toast', 2500);
}

function esc(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

init();
</script>
</body>
</html>
