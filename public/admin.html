<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🔧 Admin – Charadas con Emojis</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0f0e17; --surface: #1a1929; --surface2: #252438; --surface3: #2e2d45;
      --accent: #a855f7; --accent-dim: rgba(168,85,247,0.15);
      --success: #06d6a0; --danger: #ef233c; --warn: #ffd166;
      --text: #fffffe; --text2: #a7a9be; --border: #2e2d45;
      --radius: 10px;
    }
    html, body { height: 100%; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); overflow: hidden; }

    /* ── Login ── */
    #login {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      height: 100vh; gap: 16px;
    }
    #login h1 { font-size: 28px; }
    #login input {
      padding: 12px 16px; font-size: 16px; background: var(--surface2);
      border: 2px solid var(--border); border-radius: var(--radius); color: var(--text);
      outline: none; width: 280px;
    }
    #login input:focus { border-color: var(--accent); }
    #login .err { color: var(--danger); font-size: 13px; min-height: 18px; }

    /* ── Layout ── */
    #app { display: none; height: 100vh; flex-direction: column; }

    .topbar {
      background: var(--surface); border-bottom: 1px solid var(--border);
      padding: 0 20px; height: 52px; display: flex; align-items: center; justify-content: space-between;
      flex-shrink: 0;
    }
    .topbar-title { font-weight: 800; font-size: 16px; }
    .topbar-right { display: flex; gap: 10px; align-items: center; }

    .main { display: flex; flex: 1; overflow: hidden; }

    /* ── Sidebar ── */
    .sidebar {
      width: 240px; flex-shrink: 0; background: var(--surface);
      border-right: 1px solid var(--border); display: flex; flex-direction: column;
      overflow: hidden;
    }
    .sidebar-header { padding: 14px 16px; font-size: 11px; font-weight: 700; color: var(--text2); text-transform: uppercase; letter-spacing: 1px; border-bottom: 1px solid var(--border); }
    .cat-list { flex: 1; overflow-y: auto; padding: 8px; }
    .cat-item {
      display: flex; align-items: center; gap: 10px; padding: 10px 12px;
      border-radius: var(--radius); cursor: pointer; margin-bottom: 2px; transition: background 0.1s;
    }
    .cat-item:hover { background: var(--surface2); }
    .cat-item.active { background: var(--accent-dim); }
    .cat-thumb {
      width: 36px; height: 36px; border-radius: 6px; flex-shrink: 0;
      object-fit: cover; background: var(--surface3); display: flex; align-items: center; justify-content: center;
      font-size: 18px; overflow: hidden;
    }
    .cat-thumb img { width: 100%; height: 100%; object-fit: cover; }
    .cat-info { flex: 1; min-width: 0; }
    .cat-name { font-size: 13px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .cat-count { font-size: 11px; color: var(--text2); }
    .cat-combined { font-size: 10px; background: var(--accent-dim); color: var(--accent); padding: 1px 6px; border-radius: 10px; }
    .sidebar-footer { padding: 12px; border-top: 1px solid var(--border); }

    /* ── Panel ── */
    .panel { flex: 1; overflow: hidden; display: flex; flex-direction: column; }

    .panel-empty { flex: 1; display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 12px; color: var(--text2); }
    .panel-empty .icon { font-size: 48px; }

    /* Category header */
    .cat-header {
      background: var(--surface); border-bottom: 1px solid var(--border);
      padding: 16px 20px; display: flex; gap: 16px; align-items: flex-start; flex-shrink: 0;
    }
    .image-preview {
      width: 72px; height: 72px; border-radius: 10px; background: var(--surface2);
      border: 2px solid var(--border); flex-shrink: 0; overflow: hidden;
      display: flex; align-items: center; justify-content: center; font-size: 28px;
    }
    .image-preview img { width: 100%; height: 100%; object-fit: cover; }
    .cat-fields { flex: 1; display: flex; flex-direction: column; gap: 8px; }
    .field-row { display: flex; gap: 8px; align-items: center; }
    .field-label { font-size: 11px; color: var(--text2); width: 80px; flex-shrink: 0; }
    .field-input {
      flex: 1; padding: 8px 10px; background: var(--surface2); border: 1px solid var(--border);
      border-radius: 6px; color: var(--text); font-size: 13px; outline: none;
    }
    .field-input:focus { border-color: var(--accent); }

    /* Tabs */
    .tabs { display: flex; border-bottom: 1px solid var(--border); padding: 0 20px; flex-shrink: 0; background: var(--surface); }
    .tab-btn {
      padding: 10px 16px; font-size: 13px; font-weight: 600; color: var(--text2);
      border: none; background: none; cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -1px;
      transition: color 0.15s;
    }
    .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }

    .tab-content { display: none; flex: 1; overflow: hidden; flex-direction: column; }
    .tab-content.active { display: flex; }

    /* Words tab */
    .words-toolbar {
      padding: 12px 20px; display: flex; gap: 8px; align-items: center;
      border-bottom: 1px solid var(--border); flex-shrink: 0;
    }
    .search-input {
      flex: 1; padding: 8px 12px; background: var(--surface2); border: 1px solid var(--border);
      border-radius: var(--radius); color: var(--text); font-size: 13px; outline: none;
    }
    .search-input:focus { border-color: var(--accent); }

    .word-list { flex: 1; overflow-y: auto; padding: 8px 20px; }
    .word-item {
      display: flex; align-items: center; padding: 7px 10px; border-radius: 6px;
      border: 1px solid transparent; margin-bottom: 3px; gap: 8px;
    }
    .word-item:hover { background: var(--surface2); border-color: var(--border); }
    .word-item input {
      flex: 1; background: none; border: none; color: var(--text); font-size: 13px;
      outline: none; cursor: default;
    }
    .word-item input:focus { cursor: text; }
    .word-item .del-btn {
      background: none; border: none; color: var(--text2); cursor: pointer;
      font-size: 14px; padding: 2px 6px; border-radius: 4px; opacity: 0;
      transition: opacity 0.1s, color 0.1s;
    }
    .word-item:hover .del-btn { opacity: 1; }
    .word-item .del-btn:hover { color: var(--danger); }

    .add-word-bar {
      padding: 12px 20px; border-top: 1px solid var(--border); display: flex; gap: 8px; flex-shrink: 0;
    }

    /* Scrape tab */
    .scrape-panel { flex: 1; overflow: hidden; display: flex; flex-direction: column; }
    .scrape-toolbar { padding: 16px 20px; display: flex; flex-direction: column; gap: 10px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
    .url-row { display: flex; gap: 8px; }
    .url-input {
      flex: 1; padding: 10px 12px; background: var(--surface2); border: 1px solid var(--border);
      border-radius: var(--radius); color: var(--text); font-size: 13px; outline: none; font-family: monospace;
    }
    .url-input:focus { border-color: var(--accent); }
    .scrape-hint { font-size: 12px; color: var(--text2); }

    .scrape-results { flex: 1; overflow-y: auto; padding: 0; }
    .scrape-results-header {
      padding: 10px 20px; background: var(--surface2); border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0;
    }
    .scrape-results-count { font-size: 13px; font-weight: 700; }
    .result-table { width: 100%; border-collapse: collapse; }
    .result-table td { padding: 7px 10px; border-bottom: 1px solid var(--border); vertical-align: middle; }
    .result-table tr:hover td { background: var(--surface2); }
    .result-table .cb-col { width: 36px; text-align: center; }
    .result-table .num-col { width: 40px; color: var(--text2); font-size: 12px; text-align: right; padding-right: 12px; }
    .result-table .title-col input {
      width: 100%; background: none; border: none; color: var(--text); font-size: 13px; outline: none;
    }
    .result-table .title-col input:focus { background: var(--surface3); padding: 2px 6px; border-radius: 4px; }
    .scrape-footer { padding: 12px 20px; border-top: 1px solid var(--border); display: flex; gap: 10px; align-items: center; flex-shrink: 0; }

    /* Buttons */
    .btn {
      padding: 8px 16px; border: none; border-radius: var(--radius); font-size: 13px; font-weight: 700;
      cursor: pointer; display: inline-flex; align-items: center; gap: 6px; transition: opacity 0.15s;
      white-space: nowrap;
    }
    .btn:hover { opacity: 0.85; }
    .btn:active { opacity: 0.7; }
    .btn:disabled { opacity: 0.4; pointer-events: none; }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-success { background: var(--success); color: #0f0e17; }
    .btn-danger { background: var(--danger); color: #fff; }
    .btn-ghost { background: var(--surface2); color: var(--text); }
    .btn-sm { padding: 6px 12px; font-size: 12px; }

    /* Status / toast */
    .status-bar {
      position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%);
      background: var(--surface2); border: 1px solid var(--border); color: var(--text);
      padding: 8px 20px; border-radius: 30px; font-size: 13px; font-weight: 600;
      opacity: 0; transition: opacity 0.3s; pointer-events: none; z-index: 999;
    }
    .status-bar.show { opacity: 1; }
    .status-bar.ok { border-color: var(--success); color: var(--success); }
    .status-bar.err { border-color: var(--danger); color: var(--danger); }

    /* Loading spinner */
    .spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.6s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Checkbox */
    input[type=checkbox] { width: 16px; height: 16px; accent-color: var(--accent); cursor: pointer; }

    .words-count { font-size: 12px; color: var(--text2); padding: 0 20px 8px; flex-shrink: 0; }
  </style>
</head>
<body>

<!-- Login -->
<div id="login">
  <div style="font-size:40px">🔧</div>
  <h1>Panel de Administración</h1>
  <input type="password" id="pwd-input" placeholder="Contraseña" autocomplete="current-password">
  <button class="btn btn-primary" onclick="doLogin()">Entrar</button>
  <div class="err" id="login-err"></div>
</div>

<!-- App -->
<div id="app">
  <div class="topbar">
    <div class="topbar-title">🔧 Admin · Charadas con Emojis</div>
    <div class="topbar-right">
      <a href="/" target="_blank" class="btn btn-ghost btn-sm">🎮 Ver juego</a>
      <button class="btn btn-ghost btn-sm" onclick="logout()">Cerrar sesión</button>
    </div>
  </div>

  <div class="main">
    <!-- Sidebar -->
    <div class="sidebar">
      <div class="sidebar-header">Categorías</div>
      <div class="cat-list" id="cat-list"></div>
      <div class="sidebar-footer">
        <button class="btn btn-ghost btn-sm" style="width:100%" onclick="newCategory()">+ Nueva categoría</button>
      </div>
    </div>

    <!-- Panel -->
    <div class="panel" id="panel">
      <div class="panel-empty">
        <div class="icon">📂</div>
        <div>Seleccioná una categoría</div>
      </div>
    </div>
  </div>
</div>

<div class="status-bar" id="status"></div>

<script>
const ADMIN_KEY = sessionStorage.getItem('adminKey') || '';
let categories = [];
let selectedCat = null;
let scrapeResults = [];

// ── Auth ──

async function doLogin() {
  const pwd = document.getElementById('pwd-input').value;
  const res = await fetch('/api/categories', { headers: { 'x-admin-key': pwd } });
  // categories is public, use a private endpoint to test auth
  const test = await fetch('/api/categories/movies', { headers: { 'x-admin-key': pwd } });
  if (test.status === 401) {
    document.getElementById('login-err').textContent = 'Contraseña incorrecta';
    return;
  }
  sessionStorage.setItem('adminKey', pwd);
  location.reload();
}

document.getElementById('pwd-input').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });

function logout() {
  sessionStorage.removeItem('adminKey');
  location.reload();
}

// ── Init ──

async function init() {
  if (!ADMIN_KEY) return;
  // Test auth
  const test = await fetch('/api/categories/movies', { headers: { 'x-admin-key': ADMIN_KEY } });
  if (test.status === 401) { sessionStorage.removeItem('adminKey'); return; }

  document.getElementById('login').style.display = 'none';
  document.getElementById('app').style.display = 'flex';

  await loadCategories();
}

async function loadCategories() {
  const res = await fetch('/api/categories');
  categories = await res.json();
  renderSidebar();
  if (selectedCat) {
    const still = categories.find(c => c.id === selectedCat.id);
    if (still) selectCategory(still.id);
  }
}

function renderSidebar() {
  const el = document.getElementById('cat-list');
  el.innerHTML = categories.map(c => `
    <div class="cat-item ${selectedCat?.id === c.id ? 'active' : ''}" onclick="selectCategory('${c.id}')">
      <div class="cat-thumb" id="thumb-${c.id}">
        ${c.image ? `<img src="${c.image}" onerror="this.style.display='none'">` : getCatEmoji(c.id)}
      </div>
      <div class="cat-info">
        <div class="cat-name">${c.name}</div>
        <div class="cat-count">${c.wordCount} palabras ${c.combined ? '<span class="cat-combined">combinada</span>' : ''}</div>
      </div>
    </div>
  `).join('');
}

function getCatEmoji(id) {
  const map = { both: '🎬', movies: '🎥', series: '📺', infantiles: '🧸' };
  return map[id] || '📁';
}

// ── Select category ──

async function selectCategory(id) {
  const res = await fetch(`/api/categories/${id}`, { headers: { 'x-admin-key': ADMIN_KEY } });
  if (!res.ok) return;
  selectedCat = await res.json();
  renderSidebar();
  renderPanel();
}

function renderPanel() {
  const cat = selectedCat;
  const panel = document.getElementById('panel');
  const readonly = cat.combined;

  panel.innerHTML = `
    <!-- Header -->
    <div class="cat-header">
      <div class="image-preview" id="img-preview">
        ${cat.image ? `<img src="${cat.image}" onerror="this.innerHTML='📁'">` : getCatEmoji(cat.id)}
      </div>
      <div class="cat-fields">
        <div class="field-row">
          <span class="field-label">Nombre</span>
          <input class="field-input" id="f-name" value="${escHtml(cat.name)}" ${readonly ? 'readonly' : ''} placeholder="Nombre de categoría">
          ${!readonly ? `<button class="btn btn-primary btn-sm" onclick="saveCatMeta()">Guardar</button>` : ''}
        </div>
        <div class="field-row">
          <span class="field-label">Imagen URL</span>
          <input class="field-input" id="f-image" value="${escHtml(cat.image || '')}" ${readonly ? 'readonly' : ''} placeholder="https://ejemplo.com/imagen.jpg" oninput="previewImage(this.value)">
        </div>
        ${!readonly ? `<div class="field-row"><span class="field-label"></span><button class="btn btn-danger btn-sm" onclick="deleteCategory()">🗑 Eliminar categoría</button></div>` : '<div style="font-size:12px;color:var(--text2)">Categoría combinada – combina Películas + Series</div>'}
      </div>
    </div>

    <!-- Tabs -->
    <div class="tabs">
      <button class="tab-btn active" onclick="showTab('words', this)">📝 Palabras (${cat.words?.length || 0})</button>
      ${!readonly ? `<button class="tab-btn" onclick="showTab('scrape', this)">🌐 Importar / Scrapear</button>` : ''}
    </div>

    <!-- Words tab -->
    <div class="tab-content active" id="tab-words">
      ${readonly ? `
        <div style="padding:20px;color:var(--text2);font-size:13px">
          Esta categoría combina automáticamente las palabras de Películas y Series. Para editar palabras, seleccioná una de esas categorías.
        </div>
      ` : `
        <div class="words-toolbar">
          <input class="search-input" id="word-search" placeholder="🔍 Buscar palabra…" oninput="filterWords(this.value)">
          <button class="btn btn-danger btn-sm" id="del-selected-btn" style="display:none" onclick="deleteSelected()">🗑 Eliminar seleccionadas</button>
        </div>
        <div class="words-count" id="words-count">${cat.words?.length || 0} palabras</div>
        <div class="word-list" id="word-list"></div>
        <div class="add-word-bar">
          <input class="search-input" id="new-word-input" placeholder="Nueva palabra…" style="flex:1" onkeydown="if(event.key==='Enter')addWord()">
          <button class="btn btn-success" onclick="addWord()">+ Agregar</button>
        </div>
      `}
    </div>

    <!-- Scrape tab -->
    ${!readonly ? `
    <div class="tab-content" id="tab-scrape">
      <div class="scrape-panel">
        <div class="scrape-toolbar">
          <div class="url-row">
            <input class="url-input" id="scrape-url" placeholder="https://www.imdb.com/list/ls080023211/" value="">
            <button class="btn btn-primary" id="scrape-btn" onclick="doScrape()">🌐 Scrapear</button>
          </div>
          <div class="scrape-hint">Pegá la URL de una lista de IMDB, Wikipedia u otro sitio. El servidor intentará extraer los títulos automáticamente.</div>
        </div>
        <div id="scrape-results-wrap" style="flex:1;overflow:hidden;display:flex;flex-direction:column"></div>
        <div class="scrape-footer" id="scrape-footer" style="display:none">
          <button class="btn btn-success" id="add-selected-btn" onclick="addSelectedScrape()">✅ Agregar seleccionados (<span id="sel-count">0</span>)</button>
          <span id="scrape-status" style="font-size:12px;color:var(--text2)"></span>
        </div>
      </div>
    </div>
    ` : ''}
  `;

  if (!readonly) renderWordList(cat.words || []);
}

// ── Words ──

let currentWords = [];

function renderWordList(words, filter = '') {
  currentWords = [...words].sort((a, b) => a.localeCompare(b, 'es', { sensitivity: 'base' }));
  const filtered = filter ? currentWords.filter(w => w.toLowerCase().includes(filter.toLowerCase())) : currentWords;
  const el = document.getElementById('word-list');
  if (!el) return;
  document.getElementById('words-count').textContent = `${currentWords.length} palabras${filter ? ` · ${filtered.length} resultados` : ''}`;
  el.innerHTML = filtered.map((w, i) => `
    <div class="word-item" id="wi-${i}">
      <input type="checkbox" onchange="updateDelBtn()">
      <input value="${escHtml(w)}" onchange="editWord('${escHtml(w)}', this.value)" onblur="editWord('${escHtml(w)}', this.value)">
      <button class="del-btn" onclick="deleteWord('${escHtml(w)}')">✕</button>
    </div>
  `).join('');
}

function filterWords(q) {
  renderWordList(selectedCat.words || [], q);
}

function updateDelBtn() {
  const checked = document.querySelectorAll('#word-list input[type=checkbox]:checked').length;
  const btn = document.getElementById('del-selected-btn');
  if (btn) btn.style.display = checked > 0 ? 'inline-flex' : 'none';
  if (btn) btn.textContent = `🗑 Eliminar (${checked})`;
}

async function addWord() {
  const input = document.getElementById('new-word-input');
  const word = input.value.trim();
  if (!word) return;
  const res = await api('POST', `/api/categories/${selectedCat.id}/words`, { words: [word] });
  if (res.error) { toast(res.error, 'err'); return; }
  input.value = '';
  selectedCat.words.push(word);
  renderWordList(selectedCat.words);
  toast(`"${word}" agregada ✓`);
  refreshSidebarCount();
}

async function deleteWord(word) {
  if (!confirm(`¿Eliminar "${word}"?`)) return;
  await api('DELETE', `/api/categories/${selectedCat.id}/words`, { words: [word] });
  selectedCat.words = selectedCat.words.filter(w => w !== word);
  renderWordList(selectedCat.words, document.getElementById('word-search')?.value || '');
  toast(`"${word}" eliminada`);
  refreshSidebarCount();
}

async function deleteSelected() {
  const checked = [...document.querySelectorAll('#word-list input[type=checkbox]:checked')];
  const toDelete = checked.map(cb => cb.nextElementSibling.value);
  if (!toDelete.length) return;
  if (!confirm(`¿Eliminar ${toDelete.length} palabras?`)) return;
  await api('DELETE', `/api/categories/${selectedCat.id}/words`, { words: toDelete });
  selectedCat.words = selectedCat.words.filter(w => !toDelete.includes(w));
  renderWordList(selectedCat.words);
  toast(`${toDelete.length} palabras eliminadas`);
  refreshSidebarCount();
}

async function editWord(oldVal, newVal) {
  newVal = newVal.trim();
  if (!newVal || newVal === oldVal) return;
  // Delete old, add new
  await api('DELETE', `/api/categories/${selectedCat.id}/words`, { words: [oldVal] });
  await api('POST', `/api/categories/${selectedCat.id}/words`, { words: [newVal] });
  selectedCat.words = selectedCat.words.map(w => w === oldVal ? newVal : w);
  toast('Palabra editada ✓');
}

// ── Category meta ──

async function saveCatMeta() {
  const name = document.getElementById('f-name').value.trim();
  const image = document.getElementById('f-image').value.trim();
  await api('PUT', `/api/categories/${selectedCat.id}`, { name, image });
  selectedCat.name = name; selectedCat.image = image;
  await loadCategories();
  toast('Categoría actualizada ✓');
}

function previewImage(url) {
  const preview = document.getElementById('img-preview');
  if (!preview) return;
  if (url) {
    preview.innerHTML = `<img src="${url}" onerror="this.style.display='none'" style="width:100%;height:100%;object-fit:cover">`;
  } else {
    preview.innerHTML = getCatEmoji(selectedCat.id);
  }
}

async function deleteCategory() {
  if (!confirm(`¿Eliminar la categoría "${selectedCat.name}" y todas sus palabras?`)) return;
  await api('DELETE', `/api/categories/${selectedCat.id}`);
  selectedCat = null;
  await loadCategories();
  document.getElementById('panel').innerHTML = `<div class="panel-empty"><div class="icon">📂</div><div>Seleccioná una categoría</div></div>`;
  toast('Categoría eliminada');
}

async function newCategory() {
  const name = prompt('Nombre de la nueva categoría:');
  if (!name?.trim()) return;
  const res = await api('POST', '/api/categories', { name: name.trim() });
  if (res.error) { toast(res.error, 'err'); return; }
  await loadCategories();
  selectCategory(res.id);
  toast(`Categoría "${name}" creada ✓`);
}

// ── Scraper ──

async function doScrape() {
  const url = document.getElementById('scrape-url').value.trim();
  if (!url) return;
  const btn = document.getElementById('scrape-btn');
  const wrap = document.getElementById('scrape-results-wrap');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> Scrapeando…';
  wrap.innerHTML = '<div style="padding:30px;text-align:center;color:var(--text2)"><span class="spinner"></span> Extrayendo títulos…</div>';
  document.getElementById('scrape-footer').style.display = 'none';

  const res = await api('POST', '/api/scrape', { url });
  btn.disabled = false;
  btn.innerHTML = '🌐 Scrapear';

  if (res.error) {
    wrap.innerHTML = `<div style="padding:20px;color:var(--danger)">❌ Error: ${escHtml(res.error)}</div>`;
    return;
  }

  scrapeResults = res.titles.map(t => ({ title: t, checked: true }));
  renderScrapeResults();
}

function renderScrapeResults() {
  const wrap = document.getElementById('scrape-results-wrap');
  if (!scrapeResults.length) {
    wrap.innerHTML = '<div style="padding:20px;color:var(--text2)">No se encontraron títulos. Intentá con otra URL o revisá que el sitio sea accesible.</div>';
    return;
  }

  const checkedCount = scrapeResults.filter(r => r.checked).length;
  wrap.innerHTML = `
    <div class="scrape-results-header">
      <div class="scrape-results-count">📥 ${scrapeResults.length} títulos encontrados</div>
      <label style="font-size:13px;cursor:pointer;display:flex;align-items:center;gap:6px">
        <input type="checkbox" ${checkedCount === scrapeResults.length ? 'checked' : ''} onchange="toggleAllScrape(this.checked)"> Seleccionar todos
      </label>
    </div>
    <div class="scrape-results" style="flex:1;overflow-y:auto">
      <table class="result-table">
        <tbody id="scrape-tbody">
          ${scrapeResults.map((r, i) => `
            <tr>
              <td class="cb-col"><input type="checkbox" ${r.checked ? 'checked' : ''} onchange="toggleScrapeItem(${i}, this.checked)"></td>
              <td class="num-col">${i + 1}</td>
              <td class="title-col"><input value="${escHtml(r.title)}" onchange="scrapeResults[${i}].title = this.value"></td>
            </tr>
          `).join('')}
        </tbody>
      </table>
    </div>
  `;

  updateScrapeFooter();
  document.getElementById('scrape-footer').style.display = 'flex';
}

function toggleAllScrape(checked) {
  scrapeResults.forEach(r => r.checked = checked);
  renderScrapeResults();
}

function toggleScrapeItem(i, checked) {
  scrapeResults[i].checked = checked;
  updateScrapeFooter();
}

function updateScrapeFooter() {
  const count = scrapeResults.filter(r => r.checked).length;
  document.getElementById('sel-count').textContent = count;
  document.getElementById('add-selected-btn').disabled = count === 0;
}

async function addSelectedScrape() {
  const toAdd = scrapeResults.filter(r => r.checked).map(r => r.title.trim()).filter(Boolean);
  if (!toAdd.length) return;
  const res = await api('POST', `/api/categories/${selectedCat.id}/words`, { words: toAdd });
  if (res.error) { toast(res.error, 'err'); return; }
  selectedCat.words = [...new Set([...selectedCat.words, ...toAdd])];
  toast(`✓ ${res.added.length} palabras agregadas (${res.added.length === toAdd.length ? 'todas nuevas' : `${toAdd.length - res.added.length} ya existían`})`);
  // Clear results
  scrapeResults = [];
  document.getElementById('scrape-results-wrap').innerHTML = '';
  document.getElementById('scrape-footer').style.display = 'none';
  document.getElementById('scrape-url').value = '';
  refreshSidebarCount();
  // Switch to words tab
  showTab('words', document.querySelector('.tab-btn'));
  renderWordList(selectedCat.words);
}

// ── Helpers ──

function showTab(name, btn) {
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  const tab = document.getElementById(`tab-${name}`);
  if (tab) tab.classList.add('active');
  if (btn) btn.classList.add('active');
}

async function api(method, url, body) {
  try {
    const res = await fetch(url, {
      method,
      headers: { 'Content-Type': 'application/json', 'x-admin-key': ADMIN_KEY },
      body: body ? JSON.stringify(body) : undefined,
    });
    return await res.json();
  } catch (e) {
    return { error: e.message };
  }
}

function refreshSidebarCount() {
  const cat = categories.find(c => c.id === selectedCat?.id);
  if (cat) cat.wordCount = selectedCat.words?.length || 0;
  renderSidebar();
  // Update tab label
  const tabBtn = document.querySelector('.tab-btn');
  if (tabBtn && tabBtn.textContent.includes('Palabras')) {
    tabBtn.textContent = `📝 Palabras (${selectedCat.words?.length || 0})`;
  }
}

let toastTimer;
function toast(msg, type = 'ok') {
  const el = document.getElementById('status');
  el.textContent = msg;
  el.className = `status-bar show ${type}`;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.className = 'status-bar', 2500);
}

function escHtml(str) {
  return (str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

init();
</script>
</body>
</html>
